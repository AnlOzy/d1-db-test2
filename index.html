<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Database</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h1>People Database Test 2</h1>

    <a href="/api/test" target="_blank">
        <button type="button">View Raw JSON Data</button>
    </a>

    <hr>

    <h3>Stored People Records:</h3>
    <table>
        <thead>
            <tr>
                <th>Full Name</th>
                <th>DOB</th>
                <th>NI Number</th>
                <th>Hotel</th>
                <th>Country</th>
            </tr>
        </thead>
        <tbody id="peopleTableBody">
            </tbody>
    </table>

    <script>
        async function loadUser() {
            try {
                const res = await fetch('/api/test');
                const data = await res.json();
                
                // We target the tbody specifically
                const tableBody = document.getElementById('peopleTableBody');
                
                if (data.length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='5'>No data found</td></tr>";
                    return;
                }

                // Map the data to table rows
                tableBody.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.first_name} ${p.family_name}</td>
                        <td>${p.DateOfBirth}</td>
                        <td>${p.National_Insurance}</td>
                        <td>${p.Hotel}</td>
                        <td>${p.Country}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Error loading data:", error);
            }
        }
        
        // Run on page load
        loadUser();
    </script>
</body>
</html>
