<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Database</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>People Database</h1>

    <a href="/api/test" target="_blank">
        <button type="button">Check Raw API Data</button>
    </a>

    <hr>

    <div id="status-message"></div>

    <h3>Stored Records:</h3>
    <table>
        <thead>
            <tr>
                <th>Full Name</th>
                <th>DOB</th>
                <th>NI Number</th>
                <th>Hotel</th>
                <th>Country</th>
            </tr>
        </thead>
        <tbody id="displayArea">
            </tbody>
    </table>

    <script>
        async function loadUser() {
            console.log("Attempting to load data...");
            const display = document.getElementById('displayArea');
            const status = document.getElementById('status-message');

            try {
                const res = await fetch('/api/test');
                
                if (!res.ok) {
                    throw new Error("API responded with an error: " + res.status);
                }

                const data = await res.json();
                console.log("Data received:", data);

                if (!data || data.length === 0) {
                    display.innerHTML = "<tr><td colspan='5'>No records found in the system.</td></tr>";
                    return;
                }

                // Injecting the data into the table
                display.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.first_name || 'N/A'} ${p.family_name || ''}</td>
                        <td>${p.DateOfBirth || 'N/A'}</td>
                        <td>${p.National_Insurance || 'N/A'}</td>
                        <td>${p.Hotel || 'N/A'}</td>
                        <td>${p.Country || 'N/A'}</td>
                    </tr>
                `).join('');

                status.innerHTML = "✅ Data loaded successfully.";

            } catch (error) {
                console.error("Fetch error:", error);
                status.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
            }
        }

        // Run the function immediately
        loadUser();
    </script>
</body>
</html>
