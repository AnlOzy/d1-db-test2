<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>People Management</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .error-box { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>People Directory</h1>
    <div id="errorDisplay" class="error-box"></div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Hotel</th>
                <th>NI Number</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="peopleTable">
            <tr><td colspan="4">Loading data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    async function loadData() {
        const tableBody = document.getElementById('peopleTable');
        const errorDisplay = document.getElementById('errorDisplay');

        try {
            const res = await fetch('/api/test');
            const data = await res.json();

            // If the backend sent an error message, show it but don't crash
            if (data.error) {
                errorDisplay.style.display = 'block';
                errorDisplay.innerText = "Database Error: " + data.error;
            }

            // CRITICAL FIX: Use (data.people || []) to prevent the "map" error
            const people = data.people || [];

            if (people.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4">No records found. Try refreshing.</td></tr>';
                return;
            }

            tableBody.innerHTML = people.map(p => `
                <tr>
                    <td><strong>${p.first_name} ${p.family_name}</strong></td>
                    <td>${p.Hotel || 'N/A'}</td>
                    <td><code>${p.National_Insurance || 'N/A'}</code></td>
                    <td>
                        <button onclick="window.location.href='details.html?id=${p.People_id}'">Details</button>
                    </td>
                </tr>
            `).join('');

        } catch (err) {
            tableBody.innerHTML = '<tr><td colspan="4" style="color:red">Connection failed.</td></tr>';
            console.error(err);
        }
    }

    loadData();
</script>
</body>
</html>
